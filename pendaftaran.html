<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran</title>
    <link rel="stylesheet" href="pendaftaran.css"/>
</head>
<body>
    <h1 class="header-menu">PENDAFTARAN</h1>
    <form method="post">
         <div class="form-group">
            <label>NO RM</label><br>
            <input type="text">
        </div>
        <div class="form-group">
            <label>Nama</label>
            <input type="text">
        </div>
        <div class="form-group">
            <label>NIK</label>
            <input type="text">
        </div>
        <div class="form-group">
            <label>Tanggal Lahir</label>
            <input type="date">
        </div>
        <div class="form-group">
        <label>Poliklinik</label>
        <select>
            <option value="">Pilih</option>
            <option value="Poli Bedah">Poli Bedah</option>
            <option value="Poli Dalam">Poli Dalam</option>
            <option value="Poli Gigi">Poli Gigi</option>
            <option value="Poli Kandungan">Poli Kandungan</option>
        </select>
        </div>
        <div class="form-group">
        <label>Dokter</label>
        <select>
            <option value="">Pilih</option>
            <option value="dr. Raka Pratama, Sp.PD">dr. Raka Pratama, Sp.PD</option>
            <option value="dr. Fajar Nugroho, Sp.B">dr. Fajar Nugroho, Sp.B</option>
            <option value="drg. Maya Oktaviani, Sp.KG">drg. Maya Oktaviani, Sp.KG</option>
            <option value="dr. Nabila Maharani, Sp.OG">dr. Nabila Maharani, Sp.OG</option>
        </select>
        </div>
        <a>
        <button class="button1" type="submit">Daftar</button>
         </a>
        <a href="/index.html">
        <button class="button2" type="button" >Kembali</button>
        </a>
    </form>
</body>
</html>
